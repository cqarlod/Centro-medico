<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil · MedPanel</title>
  <link rel="stylesheet" href="css/perfil.css" />
  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="perfil-container">
    
    <!-- Botón de regreso - AHORA DINÁMICO -->
    <div class="back-button">
      <button id="btnVolver" class="btn-back">
        <i class="fas fa-arrow-left"></i>
        <span id="btnTexto">Volver al Panel</span>
      </button>
    </div>
    
    <!-- Header con mismo estilo del login -->
    <div class="perfil-header">
      <h1>Mi Perfil</h1>
      <p>Gestiona tu información personal</p>
    </div>

    <!-- Foto de perfil -->
    <div class="foto-section">
      <div class="foto-wrapper">
        <img id="fotoPerfil" src="img/default.png" alt="Foto de perfil" class="foto-perfil">
        <div class="foto-overlay" onclick="document.getElementById('inputFoto').click()">
          <span>Cambiar</span>
        </div>
      </div>
      
      <form id="fotoForm" enctype="multipart/form-data" style="display: none;">
        <input type="file" name="foto" accept="image/*" id="inputFoto">
      </form>
      <button type="button" class="btn-outline" onclick="document.getElementById('inputFoto').click()">
        <i class="fas fa-camera"></i>
        Actualizar foto
      </button>
    </div>

    <!-- Información del perfil -->
    <div class="info-section">
      <h2>Información personal</h2>
      
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Nombre completo</span>
          <span class="info-value" id="nombre">Cargando...</span>
        </div>
        
        <div class="info-item">
          <span class="info-label">Correo electrónico</span>
          <span class="info-value" id="correo">Cargando...</span>
        </div>
        
        <div class="info-item">
          <span class="info-label">Rol</span>
          <span class="info-value" id="rol">
            <span class="rol-badge" id="rolBadge">Cargando...</span>
          </span>
        </div>
      </div>
    </div>

    <!-- Cambiar contraseña -->
    <div class="password-section">
      <h2>Cambiar contraseña</h2>
      
      <form id="passwordForm">
        <div class="campo">
          <label for="actual">Contraseña actual</label>
          <input type="password" id="actual" placeholder="••••••••" required>
        </div>
        
        <div class="campo">
          <label for="nueva">Nueva contraseña</label>
          <input type="password" id="nueva" placeholder="••••••••" required>
        </div>
        
        <div class="campo">
          <label for="confirmar">Confirmar contraseña</label>
          <input type="password" id="confirmar" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-primary">
          <i class="fas fa-key"></i>
          Actualizar contraseña
        </button>
      </form>
    </div>

    <!-- Botones de acción -->
    <div class="acciones">
      <button id="logoutBtn" class="btn-logout">
        <i class="fas fa-sign-out-alt"></i>
        Cerrar sesión
      </button>
    </div>

    <!-- Mensajes -->
    <div id="mensaje" class="mensaje"></div>
  </div>

  <script>
    // ==================================
    // FUNCIONES PARA EL PERFIL
    // ==================================
    
    async function cargarPerfil() {
      try {
        // Obtener datos de la sesión
        const sessionRes = await fetch("/check-session");
        const sessionData = await sessionRes.json();
        
        if (!sessionData.autenticado) {
          window.location.href = "/auth/login";
          return;
        }
        
        const usuario = sessionData.usuario;
        
        // Actualizar datos en la página
        document.getElementById("nombre").textContent = usuario.nombre || "No especificado";
        document.getElementById("correo").textContent = usuario.correo || "No especificado";
        
        const rolTexto = usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);
        document.getElementById("rolBadge").textContent = rolTexto;
        
        // Configurar botón de regreso según el rol
        const btnVolver = document.getElementById("btnVolver");
        switch(usuario.rol) {
          case 'admin':
            btnVolver.onclick = () => window.location.href = '/admin/dashboard';
            break;
          case 'doctor':
            btnVolver.onclick = () => window.location.href = '/doctor/dashboard';
            break;
          case 'recepcionista':
            btnVolver.onclick = () => window.location.href = '/recepcionista/dashboard';
            break;
          default:
            btnVolver.onclick = () => window.location.href = '/auth/login';
        }
        
        // Cargar foto si existe
        if (usuario.foto) {
          document.getElementById("fotoPerfil").src = usuario.foto;
        }
        
      } catch (error) {
        console.error("Error cargando perfil:", error);
        mostrarMensaje("Error al cargar el perfil", "error");
      }
    }

    // Manejar cambio de foto
    document.getElementById("fotoForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const formData = new FormData();
      const fotoFile = document.getElementById("inputFoto").files[0];
      
      if (!fotoFile) {
        mostrarMensaje("Selecciona una foto", "error");
        return;
      }

      formData.append("foto", fotoFile);

      try {
        const res = await fetch("/api/usuarios/foto", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById("fotoPerfil").src = data.foto + "?t=" + Date.now();
          mostrarMensaje("Foto actualizada", "success");
        } else {
          mostrarMensaje(data.message, "error");
        }
      } catch (error) {
        console.error("Error:", error);
        mostrarMensaje("Error de conexión", "error");
      }
    });

    // Manejar cambio de contraseña
    document.getElementById("passwordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const actual = document.getElementById("actual").value;
      const nueva = document.getElementById("nueva").value;
      const confirmar = document.getElementById("confirmar").value;

      if (nueva !== confirmar) {
        mostrarMensaje("Las contraseñas no coinciden", "error");
        return;
      }

      if (nueva.length < 6) {
        mostrarMensaje("La contraseña debe tener al menos 6 caracteres", "error");
        return;
      }

      try {
        const res = await fetch("/auth/cambiar-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ actual, nueva })
        });

        const data = await res.json();

        if (res.ok) {
          mostrarMensaje("Contraseña actualizada", "success");
          document.getElementById("passwordForm").reset();
        } else {
          mostrarMensaje(data.message, "error");
        }
      } catch (error) {
        console.error("Error:", error);
        mostrarMensaje("Error de conexión", "error");
      }
    });

    // Mostrar mensajes
    function mostrarMensaje(texto, tipo) {
      const mensaje = document.getElementById("mensaje");
      mensaje.textContent = texto;
      mensaje.className = `mensaje ${tipo}`;
      
      setTimeout(() => {
        mensaje.className = "mensaje";
      }, 3000);
    }

    // Cerrar sesión
    document.getElementById("logoutBtn").addEventListener("click", () => {
      window.location.href = "/session/logout";
    });

    // Inicializar
    cargarPerfil();
  </script>
</body>
</html>
