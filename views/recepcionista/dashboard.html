<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recepcionista · MedPanel</title>
  <link rel="stylesheet" href="/css/recepcion.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* Estilo extra para el nuevo botón de aviso */
    .btn-icon.warning {
      background-color: #f39c12;
      color: white;
    }

    .btn-icon.warning:hover {
      background-color: #e67e22;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <button id="menuBtn" class="menu-btn">
      <i class="fas fa-bars"></i>
    </button>
    <div class="navbar-brand">
      <i class="fas fa-hospital"></i>
      <h1>MedPanel · Recepción</h1>
    </div>
    <div class="navbar-user">
      <i class="fas fa-user-circle"></i>
      <span id="usuarioNombre">Recepcionista</span>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-calendar-alt"></i>
      <span>Menú</span>
    </div>
    <ul>
      <li onclick="mostrarSeccion('dashboard')" class="active">
        <i class="fas fa-calendar-plus"></i>
        <span>Agendar Citas</span>
      </li>
      <li onclick="mostrarSeccion('pacientes')">
        <i class="fas fa-users"></i>
        <span>Pacientes</span>
      </li>
      <li onclick="window.location.href='/perfil'">
        <i class="fas fa-user"></i>
        <span>Mi Perfil</span>
      </li>
      <li onclick="cerrarSesion()" class="logout">
        <i class="fas fa-sign-out-alt"></i>
        <span>Cerrar sesión</span>
      </li>
    </ul>
  </aside>

  <main class="content">

    <section id="dashboard" class="seccion activa">
      <div class="section-header">
        <h2><i class="fas fa-calendar-plus"></i> Agendar Nueva Cita</h2>
      </div>

      <div class="card">
        <form id="formCita" class="form-cita">
          <div class="form-row">
            <div class="form-group">
              <label for="paciente">
                <i class="fas fa-user"></i> Paciente
              </label>
              <select id="paciente" required>
                <option value="">Selecciona un paciente</option>
              </select>
            </div>

            <div class="form-group">
              <label for="doctor">
                <i class="fas fa-user-md"></i> Doctor
              </label>
              <select id="doctor" required>
                <option value="">Selecciona un doctor</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fecha">
                <i class="fas fa-calendar"></i> Fecha
              </label>
              <input type="date" id="fecha" required />
            </div>

            <div class="form-group">
              <label for="hora">
                <i class="fas fa-clock"></i> Hora
              </label>
              <input type="time" id="hora" required />
            </div>
          </div>

          <div class="form-group">
            <label for="nota">
              <i class="fas fa-sticky-note"></i> Nota (opcional)
            </label>
            <textarea id="nota" placeholder="Observaciones o notas del paciente..."></textarea>
          </div>

          <button type="submit" class="btn-primary">
            <i class="fas fa-save"></i> Agendar Cita
          </button>
        </form>
      </div>

      <div class="section-header" style="margin-top: 40px;">
        <h2><i class="fas fa-list"></i> Citas del Día</h2>
      </div>

      <div class="citas-grid" id="listaCitas">
      </div>
    </section>

    <section id="pacientes" class="seccion">
    </section>

  </main>

  <div id="toast" class="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/realtime.js"></script>

  <script>
    // Configuración inicial de Realtime
    let miIdRecepcionista = null;
    let miNombreRecepcionista = "Recepcionista";

    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");

    // Toggle sidebar
    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });

    // Mostrar sección
    function mostrarSeccion(id) {
      document.querySelectorAll(".seccion").forEach(sec => {
        sec.classList.remove("activa");
      });
      document.getElementById(id).classList.add("activa");

      document.querySelectorAll(".sidebar li").forEach(li => {
        li.classList.remove("active");
      });
      event.currentTarget.classList.add("active");
      sidebar.classList.remove("open");
    }

    // Toast notification
    function mostrarToast(mensaje, tipo = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = mensaje;
      toast.className = `toast ${tipo}`;
      toast.style.display = 'block';

      setTimeout(() => {
        toast.style.display = 'none';
      }, 4000);
    }

    // Cerrar sesión
    function cerrarSesion() {
      window.location.href = "/session/logout";
    }

    // ==================================
    // FUNCIONES DE TIEMPO REAL
    // ==================================

    // 1. Notificar al doctor que el paciente llegó
    function avisarLlegada(nombrePaciente, idDoctor) {
      if (!miIdRecepcionista) {
        mostrarToast('Error: No se ha cargado la sesión todavía', 'error');
        return;
      }
      enviarAvisoAlDoctor(nombrePaciente, idDoctor, miIdRecepcionista);
      mostrarToast(`Avisando al doctor sobre la llegada de ${nombrePaciente}...`, 'info');
    }

    // 2. Escuchar cuando el doctor autoriza el paso
    function setupRecepcionSocket() {
      socket.on(`recepcion-${miIdRecepcionista}`, (data) => {
        mostrarToast(`¡AUTORIZADO! El paciente ${data.paciente} ya puede pasar.`, 'success');
        // Sonido
        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(e => console.log('Audio error:', e));
      });
    }

    // ==================================
    // FUNCIONES DE LA API
    // ==================================

    async function cargarPacientes() {
      try {
        const res = await fetch("/api/recepcion/pacientes");
        const pacientes = await res.json();
        const select = document.getElementById("paciente");
        select.innerHTML = '<option value="">Selecciona un paciente</option>';
        pacientes.forEach(p => {
          const option = document.createElement("option");
          option.value = p.id;
          option.textContent = p.nombre;
          select.appendChild(option);
        });
      } catch (error) { console.error('Error cargando pacientes:', error); }
    }

    async function cargarDoctores() {
      try {
        const res = await fetch("/api/recepcion/doctores");
        const doctores = await res.json();
        const select = document.getElementById("doctor");
        select.innerHTML = '<option value="">Selecciona un doctor</option>';
        doctores.forEach(doc => {
          const option = document.createElement("option");
          option.value = doc.id;
          option.textContent = `${doc.nombre} - ${doc.especialidad}`;
          select.appendChild(option);
        });
      } catch (error) { console.error('Error cargando doctores:', error); }
    }

    async function cargarCitasHoy() {
      try {
        const res = await fetch("/api/recepcion/citas-hoy");
        const citas = await res.json();
        const lista = document.getElementById("listaCitas");

        if (citas.length === 0) {
          lista.innerHTML = '<div class="empty-state">No hay citas programadas para hoy</div>';
          return;
        }

        lista.innerHTML = citas.map(c => `
          <div class="cita-card ${c.estado.toLowerCase()}">
            <div class="cita-hora">
              <i class="fas fa-clock"></i>
              <span>${c.hora}</span>
            </div>
            <div class="cita-info">
              <div class="cita-paciente">
                <i class="fas fa-user"></i> ${c.paciente}
              </div>
              <div class="cita-doctor">
                <i class="fas fa-user-md"></i> ${c.doctor}
              </div>
              ${c.nota ? `<div class="cita-nota">📝 ${c.nota}</div>` : ''}
            </div>
            <div class="cita-estado">
              <span class="estado-badge ${c.estado}">${c.estado}</span>
            </div>
            <div class="cita-acciones">
              ${c.estado === 'Programada' ? `
                <button onclick="avisarLlegada('${c.paciente}', ${c.doctor_id})" class="btn-icon warning" title="Notificar llegada al doctor">
                  <i class="fas fa-bell"></i>
                </button>

                <button onclick="cambiarEstado(${c.id}, 'Atendida')" class="btn-icon success" title="Marcar como atendida">
                  <i class="fas fa-check"></i>
                </button>
                <button onclick="cambiarEstado(${c.id}, 'Cancelada')" class="btn-icon danger" title="Cancelar cita">
                  <i class="fas fa-times"></i>
                </button>
              ` : ''}
            </div>
          </div>
        `).join('');
      } catch (error) { console.error('Error cargando citas:', error); }
    }

    // Guardar nueva cita
    document.getElementById("formCita").addEventListener("submit", async (e) => {
      e.preventDefault();

      const datos = {
        paciente_id: document.getElementById("paciente").value,
        doctor_id: document.getElementById("doctor").value,
        fecha: document.getElementById("fecha").value,
        hora: document.getElementById("hora").value,
        nota: document.getElementById("nota").value
      };

      try {
        const res = await fetch("/api/recepcion/citas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(datos)
        });

        const data = await res.json();

        if (res.ok) {
          mostrarToast(data.message, 'success');
          document.getElementById("formCita").reset();
          cargarCitasHoy();
        } else {
          mostrarToast(data.message || 'Error al guardar cita', 'error');
        }
      } catch (error) {
        mostrarToast('Error de conexión', 'error');
      }
    });

    async function cambiarEstado(id, nuevoEstado) {
      if (!confirm(`¿Seguro que deseas marcar como ${nuevoEstado}?`)) return;
      try {
        const res = await fetch(`/api/recepcion/citas/${id}/estado`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ estado: nuevoEstado })
        });
        if (res.ok) {
          mostrarToast(`Cita ${nuevoEstado.toLowerCase()}`, 'success');
          cargarCitasHoy();
        }
      } catch (error) { mostrarToast('Error de conexión', 'error'); }
    }

    async function cargarMiSesion() {
      try {
        const res = await fetch("/session/me");
        if (!res.ok) throw new Error("No sesión");
        const usuario = await res.json();

        miIdRecepcionista = usuario.id;
        miNombreRecepcionista = usuario.nombre;
        document.getElementById("usuarioNombre").textContent = miNombreRecepcionista;

        // Inicializar socket de la recepcionista ahora que sabemos su ID
        setupRecepcionSocket();
      } catch (error) {
        console.error("Error obteniendo sesión", error);
      }
    }

    window.onload = () => {
      cargarMiSesion();
      cargarPacientes();
      cargarDoctores();
      cargarCitasHoy();
    };
  </script>
</body>

</html>
