<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recepcionista · MedPanel</title>
  <link rel="stylesheet" href="/css/recepcion.css" />
    <!-- fullcalendar -->
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  <!-- Font Awesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <button id="menuBtn" class="menu-btn">
      <i class="fas fa-bars"></i>
    </button>
    <div class="navbar-brand">
      <i class="fas fa-hospital"></i>
      <h1>MedPanel · Recepción</h1>
    </div>
    <div class="navbar-user">
      <i class="fas fa-user-circle"></i>
      <span id="usuarioNombre">Recepcionista</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-calendar-alt"></i>
      <span>Menú</span>
    </div>
    <ul>
      <li onclick="mostrarSeccion('dashboard')" class="active">
        <i class="fas fa-calendar-plus"></i>
        <span>Agendar Citas</span>
      </li>
      <li onclick="mostrarSeccion('calendario')">
        <i class="fas fa-calendar-alt"></i>
        <span>Calendario</span>
      </li>
      <li onclick="mostrarSeccion('pacientes')">
        <i class="fas fa-users"></i>
        <span>Pacientes</span>
      </li>
      <li onclick="window.location.href='/perfil'">
        <i class="fas fa-user"></i>
        <span>Mi Perfil</span>
      </li>
      <li onclick="cerrarSesion()" class="logout">
        <i class="fas fa-sign-out-alt"></i>
        <span>Cerrar sesión</span>
      </li>
    </ul>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="content">

    <!-- SECCION CITAS -->
    <section id="dashboard" class="seccion activa">
      <div class="section-header">
        <h2><i class="fas fa-calendar-plus"></i> Agendar Nueva Cita</h2>
      </div>

      <div class="card">
        <form id="formCita" class="form-cita">
          <div class="form-row">
            <div class="form-group">
              <label for="paciente">
                <i class="fas fa-user"></i> Paciente
              </label>
              <select id="paciente" required>
                <option value="">Selecciona un paciente</option>
              </select>
            </div>

            <div class="form-group">
              <label for="doctor">
                <i class="fas fa-user-md"></i> Doctor
              </label>
              <select id="doctor" required>
                <option value="">Selecciona un doctor</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fecha">
                <i class="fas fa-calendar"></i> Fecha
              </label>
              <input type="date" id="fecha" required />
            </div>

            <div class="form-group">
              <label for="hora">
                <i class="fas fa-clock"></i> Hora
              </label>
              <input type="time" id="hora" required />
            </div>
          </div>

          <div class="form-group">
            <label for="nota">
              <i class="fas fa-sticky-note"></i> Nota (opcional)
            </label>
            <textarea id="nota" placeholder="Observaciones o notas del paciente..."></textarea>
          </div>

          <button type="submit" class="btn-primary">
            <i class="fas fa-save"></i> Agendar Cita
          </button>
        </form>
      </div>

      <div class="section-header" style="margin-top: 40px;">
        <h2><i class="fas fa-list"></i> Citas del Día</h2>
      </div>

      <div class="citas-grid" id="listaCitas">
        <!-- Las citas se cargan dinámicamente -->
      </div>
    </section>

    <!-- SECCION PACIENTES -->
    <section id="pacientes" class="seccion">
      <div class="section-header">
        <h2><i class="fas fa-user-plus"></i> Registrar Nuevo Paciente</h2>
      </div>

      <div class="card">
        <form id="formPaciente" class="form-paciente">
          <div class="form-row">
            <div class="form-group">
              <label for="nuevoNombre">
                <i class="fas fa-user"></i> Nombre completo
              </label>
              <input type="text" id="nuevoNombre" placeholder="Ej. Juan Pérez" required />
            </div>

            <div class="form-group">
              <label for="nuevoTelefono">
                <i class="fas fa-phone"></i> Teléfono
              </label>
              <input type="text" id="nuevoTelefono" placeholder="Ej. 555-1234" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="nuevoCorreo">
                <i class="fas fa-envelope"></i> Correo electrónico
              </label>
              <input type="email" id="nuevoCorreo" placeholder="ejemplo@correo.com" />
            </div>

            <div class="form-group">
              <label for="nuevoNacimiento">
                <i class="fas fa-birthday-cake"></i> Fecha de nacimiento
              </label>
              <input type="date" id="nuevoNacimiento" required />
            </div>
          </div>

          <button type="submit" class="btn-primary">
            <i class="fas fa-user-plus"></i> Registrar Paciente
          </button>
        </form>
      </div>

      <div class="section-header" style="margin-top: 40px;">
        <h2><i class="fas fa-search"></i> Buscar Pacientes</h2>
      </div>

      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="buscarPaciente" placeholder="Buscar por nombre o teléfono...">
      </div>

      <div class="pacientes-list" id="listaPacientes">
        <!-- Lista de pacientes cargados -->
      </div>
    </section>
    <!-- SECCION: CALENDARIO -->
    <section id="calendario" class="seccion">
      <div class="section-header">
        <h2><i class="fas fa-calendar-alt"></i> Calendario de Citas</h2>
      </div>

      <!-- Filtro por doctor -->
      <div class="card" style="margin-bottom: 20px;">
        <div class="form-row" style="align-items: flex-end;">
          <div class="form-group" style="flex: 1;">
            <label for="calendarioDoctor">
              <i class="fas fa-user-md"></i> Filtrar por Doctor
            </label>
            <select id="calendarioDoctor" class="form-control">
              <option value="todos">Todos los doctores</option>
            </select>
          </div>
          <div class="form-group">
            <button onclick="recargarCalendario()" class="btn-primary">
              <i class="fas fa-sync-alt"></i> Actualizar
            </button>
          </div>
        </div>
      </div>

      <!-- Contenedor del calendario -->
      <div id="calendario-container"></div>
    </section>
  </main>

  <!-- Mensaje flotante para notificaciones -->
  <div id="toast" class="toast"></div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");

    // Toggle sidebar
    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });

    // Cerrar sidebar al hacer clic fuera
    document.addEventListener("click", function (event) {
      const isClickInsideSidebar = sidebar.contains(event.target);
      const isClickOnMenuButton = menuBtn.contains(event.target);

      if (!isClickInsideSidebar && !isClickOnMenuButton) {
        sidebar.classList.remove("open");
      }
    });

    // Mostrar sección
    function mostrarSeccion(id) {
      document.querySelectorAll(".seccion").forEach(sec => {
        sec.classList.remove("activa");
      });
      document.getElementById(id).classList.add("activa");
      
      // Actualizar active en sidebar
      document.querySelectorAll(".sidebar li").forEach(li => {
        li.classList.remove("active");
      });
      event.currentTarget.classList.add("active");
      
      sidebar.classList.remove("open");
    }

    // Toast notification
    function mostrarToast(mensaje, tipo = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = mensaje;
      toast.className = `toast ${tipo}`;
      toast.style.display = 'block';
      
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    // Cerrar sesión
    function cerrarSesion() {
      window.location.href = "/session/logout";
    }

    // ==================================
    // FUNCIONES DE LA API
    // ==================================

    // Cargar pacientes en el select
    async function cargarPacientes() {
      try {
        const res = await fetch("/api/recepcion/pacientes");
        const pacientes = await res.json();

        const select = document.getElementById("paciente");
        select.innerHTML = '<option value="">Selecciona un paciente</option>';

        pacientes.forEach(p => {
          const option = document.createElement("option");
          option.value = p.id;
          option.textContent = p.nombre;
          select.appendChild(option);
        });

        // También cargar lista de pacientes
        const lista = document.getElementById("listaPacientes");
        if (lista) {
          lista.innerHTML = pacientes.map(p => `
            <div class="paciente-card">
              <div class="paciente-info">
                <strong>${p.nombre}</strong>
                <span>📞 ${p.telefono || 'Sin teléfono'}</span>
                <span>📧 ${p.correo || 'Sin correo'}</span>
              </div>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Error cargando pacientes:', error);
      }
    }

    // Cargar doctores
    async function cargarDoctores() {
      try {
        const res = await fetch("/api/recepcion/doctores");
        const doctores = await res.json();

        const select = document.getElementById("doctor");
        select.innerHTML = '<option value="">Selecciona un doctor</option>';

        doctores.forEach(doc => {
          const option = document.createElement("option");
          option.value = doc.id;
          option.textContent = `${doc.nombre} - ${doc.especialidad}`;
          select.appendChild(option);
        });
      } catch (error) {
        console.error('Error cargando doctores:', error);
      }
    }

    // Crear paciente
    document.getElementById("formPaciente").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nombre = document.getElementById("nuevoNombre").value;
      const telefono = document.getElementById("nuevoTelefono").value;
      const correo = document.getElementById("nuevoCorreo").value;
      const fecha_nacimiento = document.getElementById("nuevoNacimiento").value;

      try {
        const res = await fetch("/api/recepcion/pacientes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nombre, telefono, correo, fecha_nacimiento })
        });

        const data = await res.json();

        if (res.ok) {
          mostrarToast('Paciente registrado correctamente', 'success');
          document.getElementById("formPaciente").reset();
          cargarPacientes();
        } else {
          mostrarToast(data.message || 'Error al registrar', 'error');
        }
      } catch (error) {
        mostrarToast('Error de conexión', 'error');
      }
    });

    // Crear cita
    document.getElementById("formCita").addEventListener("submit", async (e) => {
      e.preventDefault();

      const paciente_id = document.getElementById("paciente").value;
      const doctor_id = document.getElementById("doctor").value;
      const fecha = document.getElementById("fecha").value;
      const hora = document.getElementById("hora").value;
      const nota = document.getElementById("nota").value;

      if (!paciente_id || !doctor_id) {
        mostrarToast('Selecciona paciente y doctor', 'error');
        return;
      }

      try {
        const res = await fetch("/api/recepcion/citas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paciente_id, doctor_id, fecha, hora, nota })
        });

        const data = await res.json();

        if (res.ok) {
          mostrarToast('Cita agendada correctamente', 'success');
          document.getElementById("formCita").reset();
          cargarCitasHoy();
        } else {
          mostrarToast(data.message || 'Error al agendar', 'error');
        }
      } catch (error) {
        mostrarToast('Error de conexión', 'error');
      }
    });

    // Cargar citas del día
    async function cargarCitasHoy() {
      try {
        const res = await fetch("/api/recepcion/citas-hoy");
        const citas = await res.json();

        const lista = document.getElementById("listaCitas");
    
        if (citas.length === 0) {
          lista.innerHTML = '<div class="empty-state">No hay citas programadas para hoy</div>';
          return;
        }

        lista.innerHTML = citas.map(c => {
          // Asegurar que estado tenga un valor por defecto
          const estado = c.estado || 'Programada';
      
          return `
            <div class="cita-card ${estado.toLowerCase()}">
              <div class="cita-hora">
                <i class="fas fa-clock"></i>
                <span>${c.hora || 'Hora no disponible'}</span>
              </div>
              <div class="cita-info">
                <div class="cita-paciente">
                  <i class="fas fa-user"></i> ${c.paciente || 'Paciente no disponible'}
                </div>
              <div class="cita-doctor">
                <i class="fas fa-user-md"></i> ${c.doctor || 'Doctor no disponible'}
              </div>
              ${c.nota ? `<div class="cita-nota">📝 ${c.nota}</div>` : ''}
              </div>
              <div class="cita-estado">
                <span class="estado-badge ${estado}">${estado}</span>
              </div>
              ${estado === 'Programada' ? `
                <div class="cita-acciones">
                  <button onclick="cambiarEstado(${c.id}, 'Atendida')" class="btn-icon success" title="Marcar como atendida">
                    <i class="fas fa-check"></i>
                  </button>
                  <button onclick="cambiarEstado(${c.id}, 'Cancelada')" class="btn-icon danger" title="Cancelar cita">
                    <i class="fas fa-times"></i>
                  </button>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
    
      } catch (error) {
        console.error('Error cargando citas:', error);
        document.getElementById("listaCitas").innerHTML = 
          '<div class="empty-state error">Error al cargar las citas</div>';
      }
    }

    // Cambiar estado de cita
    async function cambiarEstado(id, nuevoEstado) {
      if (!confirm(`¿Seguro que deseas marcar como ${nuevoEstado}?`)) return;

      try {
        const res = await fetch(`/api/recepcion/citas/${id}/estado`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ estado: nuevoEstado })
      });

      if (!res.ok) {
        const error = await res.json();
        throw new Error(error.message || 'Error al actualizar');
      }

      mostrarToast(`Cita marcada como ${nuevoEstado}`, 'success');
      cargarCitasHoy();
    
    } catch (error) {
      console.error('Error:', error);
      mostrarToast(error.message, 'error');
    }
  }

    // Buscar pacientes
    document.getElementById('buscarPaciente')?.addEventListener('input', (e) => {
      const termino = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('.paciente-card');
      
      cards.forEach(card => {
        const texto = card.textContent.toLowerCase();
        card.style.display = texto.includes(termino) ? 'flex' : 'none';
      });
    });
    
    //Funciones de calendario
    let calendar;

    function inicializarCalendario() {
    console.log("🚀 Inicializando calendario...");
  
    const calendarEl = document.getElementById('calendario-container');
    console.log("📦 Contenedor:", calendarEl);
  
    if (!calendarEl) {
      console.error("❌ No se encontró el elemento #calendario-container");
      return;
    }
  
    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'timeGridWeek',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      locale: 'es',
      buttonText: {
        today: 'Hoy',
        month: 'Mes',
        week: 'Semana',
        day: 'Día'
      },
      slotMinTime: '08:00:00',
      slotMaxTime: '20:00:00',
      allDaySlot: false,
      slotDuration: '00:30:00',
      height: 'auto',
      events: cargarEventosCalendario,
      eventDidMount: function(info) {
        console.log("Evento montado:", info.event.title);
      }
    });
  
    calendar.render();
    console.log("✅ Calendario renderizado");
    cargarDoctoresCalendario();
  }

    async function cargarDoctoresCalendario() {
      try {
        const res = await fetch("/api/recepcion/doctores-lista");
        const doctores = await res.json();
        
        const select = document.getElementById("calendarioDoctor");
        doctores.forEach(doc => {
          const option = document.createElement("option");
          option.value = doc.id;
          option.textContent = `${doc.nombre} - ${doc.especialidad}`;
          select.appendChild(option);
        });
      } catch (error) {
        console.error("Error cargando doctores:", error);
      }
    }

    async function cargarEventosCalendario(fetchInfo, successCallback, failureCallback) {
      console.log("🔍 Cargando eventos reales...");
  
      try {
        const doctorId = document.getElementById("calendarioDoctor").value;
        const fechaInicio = fetchInfo.startStr.split('T')[0];
        const fechaFin = fetchInfo.endStr.split('T')[0];
    
        const url = `/api/recepcion/citas-calendario?fecha_inicio=${fechaInicio}&fecha_fin=${fechaFin}${doctorId !== 'todos' ? `&doctor_id=${doctorId}` : ''}`;
    
        const res = await fetch(url);
        const citas = await res.json();
    
        console.log("✅ Citas reales recibidas:", citas);
    
        if (citas.length === 0) {
          successCallback([]);
          return;
        }
    
        const eventos = citas.map(c => {
          // 🔴 FORZAR formato de fecha YYYY-MM-DD
          let fechaStr;
          if (c.fecha && typeof c.fecha === 'object') {
            // Si viene como objeto Date
            const d = new Date(c.fecha);
            fechaStr = d.toISOString().split('T')[0];
          } else if (typeof c.fecha === 'string' && c.fecha.includes('T')) {
            // Si viene como string ISO
            fechaStr = c.fecha.split('T')[0];
          } else {
            // Si ya está en formato YYYY-MM-DD
            fechaStr = c.fecha;
          }
      
          // 🔴 FORZAR formato de hora HH:MM:SS
          let horaStr = c.hora;
          if (horaStr && horaStr.length === 5) {
            // Si es HH:MM, convertir a HH:MM:SS
            horaStr = horaStr + ':00';
          } else if (horaStr && horaStr.length === 8) {
            // Ya está en HH:MM:SS
            horaStr = horaStr;
          } else {
            // Valor por defecto
            horaStr = '09:00:00';
          }
      
          console.log(`📅 Cita real: ${fechaStr} ${horaStr} - ${c.paciente}`);
      
          return {
            id: c.id,
            title: `${c.paciente} - ${c.doctor}`,
            start: `${fechaStr}T${horaStr}`,
            backgroundColor: colorPorEstado(c.estado),
            borderColor: colorPorEstado(c.estado),
            textColor: '#ffffff',
            allDay: false
          };
        });
    
        console.log("📊 Eventos reales generados:", eventos);
        successCallback(eventos);
    
      } catch (error) {
        console.error("❌ Error:", error);
        failureCallback(error);
      }
    }

    function calcularHoraFin(fecha, hora) {
      // Asegurar que hora tenga formato HH:MM
      const horaParts = hora.split(':');
      const horas = parseInt(horaParts[0]);
      const minutos = parseInt(horaParts[1]) || 0;
  
      // Crear fecha fin (30 minutos después)
      const fechaFin = new Date(`${fecha}T${horas.toString().padStart(2,'0')}:${minutos.toString().padStart(2,'0')}:00`);
      fechaFin.setMinutes(fechaFin.getMinutes() + 30);
  
      // Devolver en formato ISO
      return fechaFin.toISOString();
    }

    function colorPorEstado(estado) {
      switch(estado) {
        case 'Programada': return '#0a3b5c';
        case 'Atendida': return '#28a745';
        case 'Cancelada': return '#dc3545';
        default: return '#0a3b5c';
      }
    }

    function recargarCalendario() {
      if (calendar) {
        calendar.refetchEvents();
        mostrarToast('Calendario actualizado', 'success');
      }
    }

    // Inicializar
    window.onload = () => {
      cargarPacientes();
      cargarDoctores();
      cargarCitasHoy();
      inicializarCalendario();
    };
  </script>
</body>
</html>
